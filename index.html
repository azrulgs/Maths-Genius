        const firebaseConfig = {

        // Penjana Soalan Automatik mengikut DSKP untuk memenuhi keperluan volum minimum tanpa hardcoding manual terlampau panjang
        function generateQuestionBank() {
            let idCounter = 1;

            // --- TAHUN 1 ---
            // Tambah Mudah
            for(let i=1; i<=10; i++) {
                let a = Math.floor(Math.random() * 5) + 1;
                let b = Math.floor(Math.random() * 4) + 1;
                let ans = a + b;
                MATHE_QUESTION_BANK.push({
                    id: `y1-add-e-${idCounter++}`, year: 1, topic: "Tambah Mudah", difficulty: "Mudah",
                    question: `${a} + ${b} = ?`, options: [String(ans), String(ans+1), String(ans-1), String(ans+2)].sort(),
                    correctAnswer: String(ans), explanation: `${a} ditambah dengan ${b} menghasilkan jumlah ${ans}. Anda boleh membilang terus daripada ${a} sebanyak ${b} langkah ke hadapan.`,
                    skillTag: "tambah-asas", type: "multiple-choice"
                });
            }
            // Tolak Mudah
            for(let i=1; i<=10; i++) {
                let a = Math.floor(Math.random() * 5) + 5;
                let b = Math.floor(Math.random() * 4) + 1;
                let ans = a - b;
                MATHE_QUESTION_BANK.push({
                    id: `y1-sub-e-${idCounter++}`, year: 1, topic: "Tolak Mudah", difficulty: "Mudah",
                    question: `${a} - ${b} = ?`, options: [String(ans), String(ans+1), String(ans-1), String(ans+2)].sort(),
                    correctAnswer: String(ans), explanation: `${a} dikurangkan sebanyak ${b} tinggal ${ans}. Bayangkan anda mengeluarkan ${b} objek daripada kumpulan yang mengandungi ${a} objek.`,
                    skillTag: "tolak-asas", type: "multiple-choice"
                });
            }
            // Tambah Sederhana
            for(let i=1; i<=10; i++) {
                let a = Math.floor(Math.random() * 10) + 10;
                let b = Math.floor(Math.random() * 9) + 1;
                let ans = a + b;
                MATHE_QUESTION_BANK.push({
                    id: `y1-add-m-${idCounter++}`, year: 1, topic: "Tambah Mudah", difficulty: "Sederhana",
                    question: `${a} + ${b} = ?`, options: [String(ans), String(ans+2), String(ans-1), String(ans+5)].sort(),
                    correctAnswer: String(ans), explanation: `Gunakan kaedah bentuk lazim. Tambah nilai sa dahulu, kemudian tambah nilai puluh. ${a} + ${b} = ${ans}.`,
                    skillTag: "tambah-puluh", type: "multiple-choice"
                });
            }
            // Tolak Sederhana
            for(let i=1; i<=10; i++) {
                let a = Math.floor(Math.random() * 10) + 10;
                let b = Math.floor(Math.random() * 8) + 1;
                let ans = a - b;
                MATHE_QUESTION_BANK.push({
                    id: `y1-sub-m-${idCounter++}`, year: 1, topic: "Tolak Mudah", difficulty: "Sederhana",
                    question: `${a} - ${b} = ?`, options: [String(ans), String(ans+1), String(ans-1), String(ans-2)].sort(),
                    correctAnswer: String(ans), explanation: `Bentuk lazim memudahkan pengiraan. Tolak unit sa dahulu: ${a} tolak ${b} ialah ${ans}.`,
                    skillTag: "tolak-puluh", type: "multiple-choice"
                });
            }
            // Soalan Situasi Tambah & Tolak & Campuran (Mencabar Tahun 1)
            const y1Contexts = [
                {q: "Ali ada 12 biji gula-gula. Ibu beri 5 biji lagi. Berapa jumlah gula-gula Ali?", a: 17, exp: "Operasi tambah diperlukan kerana ibu memberikan lagi gula-gula. 12 + 5 = 17.", tag: "situasi-tambah"},
                {q: "Siti ada 10 pensel. Ayah beri 8 pensel lagi. Berapa jumlah pensel Siti?", a: 18, exp: "Kira jumlah keseluruhan pensel dengan menambah: 10 + 8 = 18 pensel.", tag: "situasi-tambah"},
                {q: "Dalam bakul ada 14 epal. Ibu tambah 6 epal. Berapa jumlah epal?", a: 20, exp: "Tambah 6 kepada 14. Maka, 14 + 6 = 20 epal semuanya.", tag: "situasi-tambah"},
                {q: "Ali ada 15 biji gula-gula. Dia makan 5 biji. Berapa baki gula-gula?", a: 10, exp: "Apabila dimakan, jumlah gula-gula berkurang. Gunakan operasi tolak: 15 - 5 = 10.", tag: "situasi-tolak"},
                {q: "Sara ada 18 pensel. Dia beri 6 kepada adiknya. Berapa baki pensel?", a: 12, exp: "Diberi kepada adik bermaksud ditolak. 18 - 6 = 12 pensel baki.", tag: "situasi-tolak"},
                {q: "Dalam kotak ada 20 bola. 7 bola dikeluarkan. Berapa baki bola?", a: 13, exp: "Bola dikeluarkan mengurangkan kuantiti dalam kotak: 20 - 7 = 13.", tag: "situasi-tolak"},

                {q: "Ibu ada 16 epal. Ibu beri 4 epal kepada jiran. Berapa baki epal?", a: 12, exp: "Memberi kepada jiran dikira operasi tolak: 16 - 4 = 12 epal.", tag: "situasi-tolak"},
                {q: "Ada 11 murid lelaki dan 8 murid perempuan. Berapa jumlah murid?", a: 19, exp: "Gabungkan kumpulan murid lelaki dan perempuan: 11 + 8 = 19 murid.", tag: "situasi-campuran"},
                {q: "Amir ada 19 pelekat. Dia hilang 9 pelekat. Berapa baki pelekat?", a: 10, exp: "Pelekat yang hilang mesti ditolak daripada jumlah asal: 19 - 9 = 10.", tag: "situasi-campuran"}
            ];
            y1Contexts.forEach((c, idx) => {
                MATHE_QUESTION_BANK.push({
                    id: `y1-sit-h-${idCounter++}`, year: 1, topic: idx < 4 ? "Soalan Situasi Tambah" : (idx < 8 ? "Soalan Situasi Tolak" : "Campuran Tambah dan Tolak"), difficulty: "Mencabar",
                    question: c.q, options: [String(c.a), String(c.a+2), String(c.a-3), String(c.a+5)].sort(),
                    correctAnswer: String(c.a), explanation: c.exp, skillTag: c.tag, type: "multiple-choice"
                });
            });
            // Melengkapkan baki soalan Tahun 1 sehingga mencapai kuota 60 soalan minimum
            while(MATHE_QUESTION_BANK.filter(q => q.year === 1).length < 60) {
                let a = Math.floor(Math.random() * 20) + 1;
                let b = Math.floor(Math.random() * 10) + 1;
                let ans = a + b;
                MATHE_QUESTION_BANK.push({
                    id: `y1-extra-${idCounter++}`, year: 1, topic: "Tambah Mudah", difficulty: "Sederhana",
                    question: `${a} + ${b} = ?`, options: [String(ans), String(ans+1), String(ans-2), String(ans+3)].sort(),
                    correctAnswer: String(ans), explanation: `Pengiraan pengukuhan KSSR: Tambahkan ${a} dengan ${b} mendapat hasil ${ans}.`,
                    skillTag: "tambah-pengukuhan", type: "multiple-choice"
                });
            }

            // --- TAHUN 2 ---
            // Tambah & Tolak (Mudah/Sederhana)
            for(let i=1; i<=15; i++) {
                let a = Math.floor(Math.random() * 200) + 50;
                let b = Math.floor(Math.random() * 100) + 10;
                let ans_add = a + b;
                MATHE_QUESTION_BANK.push({
                    id: `y2-add-${idCounter++}`, year: 2, topic: "Tambah", difficulty: i <= 7 ? "Mudah" : "Sederhana",
                    question: `${a} + ${b} = ?`, options: [String(ans_add), String(ans_add+10), String(ans_add-5), String(ans_add+15)].sort(),
                    correctAnswer: String(ans_add), explanation: `Susun mengikut nilai tempat ratus, puluh dan sa. Hasil tambah ialah ${ans_add}.`,
                    skillTag: "tambah-ratus", type: "multiple-choice"
                });

                let ans_sub = a + 100 - b;
                let start_sub = a + 100;
                MATHE_QUESTION_BANK.push({
                    id: `y2-sub-${idCounter++}`, year: 2, topic: "Tolak", difficulty: i <= 7 ? "Mudah" : "Sederhana",
                    question: `${start_sub} - ${b} = ?`, options: [String(ans_sub), String(ans_sub-10), String(ans_sub+5), String(ans_sub+20)].sort(),
                    correctAnswer: String(ans_sub), explanation: `Lakukan penolakan bermula dari sa. Kumpul semula sekiranya perlu. Baki ialah ${ans_sub}.`,
                    skillTag: "tolak-ratus", type: "multiple-choice"
                });
            }
            // Darab Asas (2,3,4,5,10)
            const multiTables = [2, 3, 4, 5, 10];
            for(let i=1; i<=20; i++) {
                let t = multiTables[Math.floor(Math.random() * multiTables.length)];
                let m = Math.floor(Math.random() * 9) + 1;
                let ans = t * m;
                MATHE_QUESTION_BANK.push({
                    id: `y2-mul-${idCounter++}`, year: 2, topic: "Darab 2, 3, 4, 5 dan 10", difficulty: m <= 5 ? "Mudah" : "Sederhana",
                    question: `${t} × ${m} = ?`, options: [String(ans), String(ans+t), String(ans-t), String(ans+2)].sort(),
                    correctAnswer: String(ans), explanation: `Darab ialah operasi tambah berulang. ${t} kali kumpulan berukuran ${m} bersamaan dengan ${ans}.`,
                    skillTag: "darab-asas", type: "multiple-choice"
                });
            }
            // Bahagi Mudah
            for(let i=1; i<=15; i++) {
                let t = multiTables[Math.floor(Math.random() * multiTables.length)];
                let m = Math.floor(Math.random() * 9) + 1;
                let product = t * m;
                MATHE_QUESTION_BANK.push({
                    id: `y2-div-${idCounter++}`, year: 2, topic: "Bahagi Mudah", difficulty: m <= 5 ? "Mudah" : "Sederhana",
                    question: `${product} ÷ ${t} = ?`, options: [String(m), String(m+1), String(m-1), String(m+2)].sort(),
                    correctAnswer: String(m), explanation: `Bahagi ialah songsangan bagi darab. Kerana ${t} × ${m} = ${product}, maka ${product} dibahagi ${t} ialah ${m}.`,
                    skillTag: "bahagi-asas", type: "multiple-choice"
                });
            }
            // Soalan Situasi Mencabar Tahun 2
            const y2Situations = [
                {q: "Ada 5 beg. Setiap beg ada 4 buku. Berapa jumlah buku semuanya?", a: 20, exp: "5 kumpulan dikali dengan 4 buku: 5 × 4 = 20 buku.", tag: "situasi-darab"},
                {q: "Ada 6 kotak. Setiap kotak ada 5 pensel. Berapa jumlah pensel?", a: 30, exp: "Gunakan sifir 5 untuk penambahan berulang: 6 × 5 = 30 pensel.", tag: "situasi-darab"},
                {q: "24 gula-gula dibahagi sama rata kepada 4 murid. Setiap murid dapat berapa?", a: 6, exp: "Agihan sama rata memerlukan operasi bahagi: 24 ÷ 4 = 6 biji gula-gula.", tag: "situasi-bahagi"},
                {q: "Kedai ada 250 roti. 75 roti dijual. Berapa baki roti yang tinggal?", a: 175, exp: "Roti yang telah dijual mengurangkan stok asal: 250 - 75 = 175 roti.", tag: "situasi-tolak"},
                {q: "Sara ada RM50. Dia belanja RM18 untuk membeli buku. Berapa baki wangnya?", a: 32, exp: "Tolak perbelanjaan daripada jumlah wang awal: RM50 - RM18 = RM32.", tag: "situasi-wang"}
            ];
            y2Situations.forEach((s) => {
                MATHE_QUESTION_BANK.push({
                    id: `y2-sit-h-${idCounter++}`, year: 2, topic: "Soalan Situasi", difficulty: "Mencabar",
                    question: s.q, options: [String(s.a), String(s.a+5), String(s.a-2), String(s.a+10)].sort(),
                    correctAnswer: String(s.a), explanation: s.exp, skillTag: s.tag, type: "multiple-choice"
                });
            });
            // Memastikan kuota Tahun 2 mencapai 80 soalan
            while(MATHE_QUESTION_BANK.filter(q => q.year === 2).length < 80) {
                let a = Math.floor(Math.random() * 50) + 10;
                let b = 2;
                let ans = a * b;
                MATHE_QUESTION_BANK.push({
                    id: `y2-extra-${idCounter++}`, year: 2, topic: "Campuran Operasi", difficulty: "Sederhana",
                    question: `${a} × ${b} = ?`, options: [String(ans), String(ans+2), String(ans-2), String(ans+10)].sort(),
                    correctAnswer: String(ans), explanation: `Kira dengan mendarab unit sa kemudian unit puluh: ${a} × ${b} = ${ans}.`,
                    skillTag: "darab-campuran", type: "multiple-choice"
                });
            }

            // --- TAHUN 3 ---
            // Operasi Nombor Besar (Sehingga 10,000)
            for(let i=1; i<=25; i++) {
                let a = Math.floor(Math.random() * 4000) + 1000;
                let b = Math.floor(Math.random() * 3000) + 500;
                let ans_add = a + b;
                MATHE_QUESTION_BANK.push({
                    id: `y3-add-${idCounter++}`, year: 3, topic: "Tambah Nombor Besar", difficulty: i <= 10 ? "Mudah" : "Sederhana",
                    question: `${a.toLocaleString()} + ${b.toLocaleString()} = ?`, options: [String(ans_add), String(ans_add+100), String(ans_add-50), String(ans_add+1000)],
                    correctAnswer: String(ans_add), explanation: `Pengiraan melibatkan nilai tempat ribu. Pastikan susunan bentuk lazim anda lurus dan tepat. Jumlahnya ialah ${ans_add}.`,
                    skillTag: "tambah-ribu", type: "multiple-choice"
                });

                let ans_sub = a - b > 0 ? a - b : b - a;
                let start_sub = a - b > 0 ? a : b;
                let sub_val = a - b > 0 ? b : a;
                MATHE_QUESTION_BANK.push({
                    id: `y3-sub-${idCounter++}`, year: 3, topic: "Tolak Nombor Besar", difficulty: i <= 10 ? "Mudah" : "Sederhana",
                    question: `${start_sub.toLocaleString()} - ${sub_val.toLocaleString()} = ?`, options: [String(ans_sub), String(ans_sub+20), String(ans_sub-10), String(ans_sub+200)],
                    correctAnswer: String(ans_sub), explanation: `Lakukan penolakan dari kanan ke kiri. Pinjam dari nilai tempat sebelah sekiranya nilai tidak mencukupi. Baki ialah ${ans_sub}.`,
                    skillTag: "tolak-ribu", type: "multiple-choice"
                });
            }
            // Darab Lebih Besar & Bahagi Lebih Besar
            for(let i=1; i<=20; i++) {
                let a = Math.floor(Math.random() * 50) + 10;
                let b = Math.floor(Math.random() * 7) + 3;
                let ans_mul = a * b;
                MATHE_QUESTION_BANK.push({
                    id: `y3-mul-${idCounter++}`, year: 3, topic: "Darab", difficulty: "Sederhana",
                    question: `${a} × ${b} = ?`, options: [String(ans_mul), String(ans_mul+10), String(ans_mul-5), String(ans_mul+4)].sort(),
                    correctAnswer: String(ans_mul), explanation: `Gunakan sifir ${b}. Selesaikan mengikut lajur langkah demi langkah untuk mendapatkan ${ans_mul}.`,
                    skillTag: "darab-lanjut", type: "multiple-choice"
                });

                let m = Math.floor(Math.random() * 12) + 2;
                let product = b * m;
                MATHE_QUESTION_BANK.push({
                    id: `y3-div-${idCounter++}`, year: 3, topic: "Bahagi", difficulty: "Sederhana",
                    question: `${product} ÷ ${b} = ?`, options: [String(m), String(m+2), String(m-1), String(m+5)].sort(),
                    correctAnswer: String(m), explanation: `Bahagi nombor bernilai besar. Cari gandaan sifir ${b} yang menyamai ${product}. Jawapannya ialah ${m}.`,
                    skillTag: "bahagi-lanjut", type: "multiple-choice"
                });
            }
            // Penyelesaian Masalah Mencabar Berdasarkan Konteks DSKP
            const y3Problems = [
                {q: "Perpustakaan ada 2,450 buku. Sebanyak 1,275 buku baru ditambah. Berapa jumlah buku sekarang?", a: 3725, exp: "Tambahkan kuantiti asal dengan kuantiti baru: 2450 + 1275 = 3725.", tag: "masalah-tambah"},
                {q: "Sebuah kedai ada 5,000 botol air mineral. 2,350 botol telah terjual. Berapa baki botol air?", a: 2650, exp: "Tolak jualan untuk tahu baki botol: 5000 - 2350 = 2650 botol air.", tag: "masalah-tolak"},
                {q: "Satu kotak mengandungi 24 batang pensel. Jika ada 8 buah kotak yang serupa, berapakah jumlah pensel?", a: 192, exp: "Darab bilangan unit kandungan dengan jumlah kotak: 24 × 8 = 192.", tag: "masalah-darab"},
                {q: "144 buah buku dibahagi sama rata kepada 12 orang murid. Berapa buku diperoleh setiap murid?", a: 12, exp: "Bahagikan jumlah keseluruhan buku kepada bilangan murid: 144 ÷ 12 = 12 buku.", tag: "masalah-bahagi"},
                {q: "Sebuah kilang menghasilkan 4,125 biskut pada waktu pagi dan 3,240 biskut pada waktu petang. Berapa jumlah biskut?", a: 7365, exp: "Gabungkan pengeluaran pagi dan petang menggunakan operasi tambah: 4125 + 3240 = 7365.", tag: "masalah-campuran"}
            ];
            y3Problems.forEach((p) => {
                MATHE_QUESTION_BANK.push({
                    id: `y3-prob-h-${idCounter++}`, year: 3, topic: "Penyelesaian Masalah", difficulty: "Mencabar",
                    question: p.q, options: [String(p.a), String(p.a+200), String(p.a-50), String(p.a+15)].sort(),
                    correctAnswer: String(p.a), explanation: p.exp, skillTag: p.tag, type: "multiple-choice"
                });
            });
            // Memastikan kuota Tahun 3 mencapai 100 soalan
            while(MATHE_QUESTION_BANK.filter(q => q.year === 3).length < 100) {

                    correctAnswer: String(ans), explanation: `Tambahkan terus menggunakan susunan aritmetik standard: ${a} + ${b} = ${ans}.`,
                    skillTag: "campuran-ribu", type: "multiple-choice"

        // ==========================================

        class MathsGeniusApp {

            getVault() {
                return JSON.parse(localStorage.getItem('maths_genius_vault'));

            updateVault(data) {
                localStorage.setItem('maths_genius_vault', JSON.stringify(data));

                this.viewState = view;

            // --- SEKTOR PROSES MAKLUMAT PENGGUNA (AUTH) ---
            registerParent(formData) {
                const vault = this.getVault();
                if (vault.parents.find(p => p.email === formData.email)) {
                    alert('E-mel ini telah pun didaftarkan!');
                    return false;
                }
                const newParent = {
                    id: 'parent-' + Date.now(),
                    name: formData.name,
                    email: formData.email,
                    phone: formData.phone,
                    passwordHash: formData.password, // Simulasi hash
                    accessStatus: 'Demo Mode',
                    createdAt: new Date().toISOString()
                };
                vault.parents.push(newParent);
                vault.currentParent = newParent;
                this.updateVault(vault);
                this.navigateTo('parent-dashboard');
                return true;
            }

            loginParent(email, password) {
                const vault = this.getVault();
                const parent = vault.parents.find(p => p.email === email && p.passwordHash === password);
                if (parent) {
                    vault.currentParent = parent;
                    this.updateVault(vault);
                    this.navigateTo('parent-dashboard');
                    return true;
                }
                alert('E-mel atau kata laluan salah!');
                return false;
            }

            logout() {
                const vault = this.getVault();
                vault.currentParent = null;
                vault.currentChild = null;
                this.updateVault(vault);
                this.navigateTo('landing');
            }

            activateCode(code) {
                const vault = this.getVault();
                if (!vault.currentParent) return alert('Sila log masuk akaun ibu bapa terlebih dahulu.');
                if (code.trim() === 'GENIUS123') {
                    vault.currentParent.accessStatus = 'Lifetime Active';
                    // Kemaskini juga rekod dalam senarai ibu bapa
                    const idx = vault.parents.findIndex(p => p.id === vault.currentParent.id);
                    if(idx !== -1) vault.parents[idx].accessStatus = 'Lifetime Active';
                    this.updateVault(vault);
                    alert('Tahniah! Akses Penuh Seumur Hidup (Lifetime Active) telah berjaya diaktifkan.');
                    this.navigateTo('parent-dashboard');
                } else {
                    alert('Kod pengaktifan tidak sah. Sila guna kod: GENIUS123');
                }
            }

            // --- SEKTOR PENGURUSAN PROFIL ANAK ---
            addChild(childData) {
                const vault = this.getVault();
                if (!vault.currentParent) return;
                const newChild = {
                    id: 'child-' + Date.now(),
                    parentId: vault.currentParent.id,
                    name: childData.name,
                    age: parseInt(childData.age),
                    yearLevel: parseInt(childData.yearLevel),
                    avatar: childData.avatar || '👦',
                    pin: childData.pin,
                    totalStars: 0,
                    totalScore: 0,
                    currentLevel: 'Genius Beginner',
                    streak: 1,
                    createdAt: new Date().toISOString()
                };
                vault.children.push(newChild);
                this.updateVault(vault);
                alert(`Profil ${childData.name} berjaya dicipta!`);
                this.navigateTo('parent-dashboard');
            }

            selectChildPortal(childId) {
                const vault = this.getVault();
                const child = vault.children.find(c => c.id === childId);
                if (child) {
                    this.targetChildForPin = child;
                    this.navigateTo('child-pin-login');
                }
            }

            verifyChildPin(pin) {
                if (this.targetChildForPin && this.targetChildForPin.pin === pin) {
                    const vault = this.getVault();
                    vault.currentChild = this.targetChildForPin;
                    this.updateVault(vault);
                    this.targetChildForPin = null;
                    this.navigateTo('child-dashboard');
                } else {
                    alert('PIN salah! Sila cuba lagi.');
                }
            }

            exitChildMode() {
                const vault = this.getVault();
                vault.currentChild = null;
                this.updateVault(vault);
                this.navigateTo('parent-dashboard');
            }

            // --- LENGKAP STRUKTUR TAHAP PENGUASAAN ---
            calculateLevel(score) {
                if (score >= 1000) return 'Maths Genius Master';
                if (score >= 600) return 'Genius Champion';
                if (score >= 300) return 'Genius Star';
                if (score >= 100) return 'Genius Explorer';
                return 'Genius Beginner';
            }

            // --- WORKSPACE LATIHAN & ENJIN JAWAB SOALAN ---
            startQuiz(year, topic, difficulty, mode = 'normal') {
                let filtered = MATHE_QUESTION_BANK.filter(q => q.year === parseInt(year));
                if (topic && topic !== 'all') {
                    filtered = filtered.filter(q => q.topic === topic);
                }
                if (difficulty && difficulty !== 'all') {
                    filtered = filtered.filter(q => q.difficulty === difficulty);
                }

                // Ambil 10 soalan secara rawak sekiranya mencukupi
                if(filtered.length === 0) {
                    alert("Maaf, tiada soalan yang sepadan dijumpai.");
                    return;
                }
                
                // Shuffle array
                filtered.sort(() => 0.5 - Math.random());
                this.activeQuiz = filtered.slice(0, 10);
                this.currentQuestionIndex = 0;
                this.quizScore = 0;
                this.consecutiveCorrect = 0;
                this.bonusPointsEarned = 0;
                this.selectedAnswer = null;
                this.quizMode = mode; // 'normal' atau 'daily'
                this.wrongQuestionsLogged = [];
                
                this.navigateTo('quiz-workspace');
            }

            submitAnswer(ans) {
                if (this.selectedAnswer !== null) return; // Dah jawab
                this.selectedAnswer = ans;
                
                const q = this.activeQuiz[this.currentQuestionIndex];
                const isCorrect = (ans === q.correctAnswer);
                
                if (isCorrect) {
                    this.quizScore += 10;
                    this.consecutiveCorrect++;
                    if (this.consecutiveCorrect >= 5) {
                        this.bonusPointsEarned += 20;
                        this.quizScore += 20;
                        this.consecutiveCorrect = 0; // Reset streak bonus
                    }
                } else {
                    this.consecutiveCorrect = 0;
                    this.logWrongQuestion(q);
                }

                this.logAttempt(q, ans, isCorrect);
                this.renderQuestionWorkspace(true); // Papar dengan respon Cikgu Geni
            }

            logWrongQuestion(question) {
                const vault = this.getVault();
                if (!vault.currentChild) return;
                
                let wbEntry = vault.wrongBook.find(w => w.childId === vault.currentChild.id && w.questionId === question.id);
                if (!wbEntry) {
                    vault.wrongBook.push({
                        id: 'wb-' + Date.now() + Math.random(),
                        childId: vault.currentChild.id,
                        questionId: question.id,
                        wrongCount: 1,
                        correctRetryCount: 0,
                        mastered: false,
                        updatedAt: new Date().toISOString()
                    });
                } else {
                    wbEntry.wrongCount++;
                    wbEntry.mastered = false;
                    wbEntry.updatedAt = new Date().toISOString();
                }
                this.updateVault(vault);
            }

            logAttempt(question, selectedAnswer, isCorrect) {
                const vault = this.getVault();
                if (!vault.currentChild) return;

                // Log Rekod Percubaan Am
                vault.attempts.push({
                    id: 'att-' + Date.now(),
                    childId: vault.currentChild.id,
                    questionId: question.id,
                    selectedAnswer: selectedAnswer,
                    isCorrect: isCorrect,
                    timeTaken: 5, 
                    attemptedAt: new Date().toISOString()
                });

                // Kemaskini Progress Penguasaan Makmal Topik
                let prog = vault.progress.find(p => p.childId === vault.currentChild.id && p.topic === question.topic && p.difficulty === question.difficulty);
                if (!prog) {
                    vault.progress.push({
                        id: 'prog-' + Date.now(),
                        childId: vault.currentChild.id,
                        year: question.year,
                        topic: question.topic,
                        difficulty: question.difficulty,
                        totalAttempted: 1,
                        totalCorrect: isCorrect ? 1 : 0,
                        masteryPercentage: isCorrect ? 100 : 0
                    });
                } else {
                    prog.totalAttempted++;
                    if(isCorrect) prog.totalCorrect++;
                    prog.masteryPercentage = Math.round((prog.totalCorrect / prog.totalAttempted) * 100);
                }

                this.updateVault(vault);
            }

            nextQuestion() {
                this.selectedAnswer = null;
                this.currentQuestionIndex++;
                if (this.currentQuestionIndex < this.activeQuiz.length) {
                    this.renderQuestionWorkspace(false);
                } else {
                    this.finishQuiz();
                }
            }

            finishQuiz() {
                const vault = this.getVault();
                const child = vault.children.find(c => c.id === vault.currentChild.id);
                
                // Hitung pencapaian bintang: Setiap 10 soalan siap dapat 1 bintang secara lalai + bonus mata kuiz
                const starsEarned = Math.floor(this.quizScore / 30) > 0 ? Math.floor(this.quizScore / 30) : 1;
                
                child.totalScore += this.quizScore;
                child.totalStars += starsEarned;
                child.currentLevel = this.calculateLevel(child.totalScore);
                
                if(this.quizMode === 'daily') {
                    child.streak = (child.streak || 1) + 1;
                }

                vault.currentChild = child;
                // Update child record in array too
                const idx = vault.children.findIndex(c => c.id === child.id);
                if(idx !== -1) vault.children[idx] = child;

                this.updateVault(vault);
                this.navigateTo('quiz-results');
            }

            // --- LOGIK RANGKAIAN BUKU SALAH SAYA REMEDIATION ---
            retryWrongQuestion(wbId, chosenAns) {
                const vault = this.getVault();
                const wb = vault.wrongBook.find(w => w.id === wbId);
                const q = MATHE_QUESTION_BANK.find(quest => quest.id === wb.questionId);
                
                const correct = (chosenAns === q.correctAnswer);
                if (correct) {
                    wb.correctRetryCount++;
                    if(wb.correctRetryCount >= 3) {
                        wb.mastered = true;
                    }
                    alert("Hebat! Jawapan percubaan semula anda betul.");
                } else {
                    wb.correctRetryCount = 0; // Reset progress mastery jika salah balik
                    alert(`Kurang tepat. Cara kerja: ${q.explanation}`);
                }
                wb.updatedAt = new Date().toISOString();
                this.updateVault(vault);
                this.navigateTo('wrong-book');
            }

                            <span>Soalan ${this.currentQuestionIndex + 1}/${this.activeQuiz.length}</span>
                        </div>
                        <div class="w-full bg-slate-200 h-2 rounded-full mb-8 overflow-hidden">
                            <div class="bg-purple-premium h-full transition-all duration-300" style="width: ${progressPercent}%"></div>
                        </div>

                        <div class="bg-white p-6 sm:p-8 rounded-3xl shadow-sm border border-purple-soft text-center mb-6">
                            <span class="bg-purple-50 text-purple-premium text-[10px] font-bold px-3 py-1 rounded-full tracking-wide uppercase">${q.skillTag}</span>
                            <h3 class="heading-font font-bold text-xl sm:text-2xl text-slate-800 mt-4 leading-relaxed">${q.question}</h3>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            ${optionsHtml}
                        </div>

                        ${tutorFeedbackHtml}
                    </div>
                `;
            }

            templateQuizResults() {
                const vault = this.getVault();
                const child = vault.currentChild;
                const starsEarned = Math.floor(this.quizScore / 30) > 0 ? Math.floor(this.quizScore / 30) : 1;

                return `
                    <div class="max-w-md mx-auto px-4 py-12 w-full text-center flex-grow flex flex-col justify-center">
                        <div class="bg-white p-8 rounded-3xl shadow-xl border border-purple-soft">
                            <div class="w-20 h-20 bg-amber-100 text-amber-500 text-4xl rounded-full flex items-center justify-center mx-auto mb-4 animate-bounce"><i class="fa-solid fa-trophy"></i></div>
                            <h2 class="heading-font text-2xl font-black text-purple-premium mb-1">Tugasan Selesai!</h2>
                            <p class="text-xs text-slate-400 mb-6">Hebat, anda telah menunjukkan kesungguhan yang luar biasa.</p>
                            
                            <div class="bg-lavender-soft p-4 rounded-2xl grid grid-cols-2 gap-4 mb-6 text-xs font-bold">
                                <div>
                                    <span class="text-slate-400 block">Mata Diperoleh</span>
                                    <span class="text-xl text-purple-premium font-black heading-font">+${this.quizScore}</span>
                                </div>
                                <div>
                                    <span class="text-slate-400 block">Bintang Ditambah</span>
                                    <span class="text-xl text-amber-500 font-black heading-font">🌟 +${starsEarned}</span>
                                </div>
                                ${this.bonusPointsEarned > 0 ? `<div class="col-span-2 bg-emerald-50 text-emerald-800 p-1.5 rounded-lg text-[10px]">🔥 Bonus Kekompatibelan: +25 Mata Berterusan Dijana!</div>` : ''}
                            </div>

                            <p class="text-sm text-slate-700 font-medium mb-6">"Setiap usaha kecil hari ini adalah permulaan kejayaan besar hari esok."<br><span class="text-xs font-bold text-purple-premium">- Cikgu Geni</span></p>

                            <button onclick="app.navigateTo('child-dashboard')" class="w-full py-3 bg-purple-premium hover:bg-purple-700 text-white font-bold rounded-xl transition text-sm heading-font shadow-md">Kembali ke Dashboard</button>
                        </div>
                    </div>
                `;
            }

            templateWrongBook() {
                const vault = this.getVault();
                const child = vault.currentChild;
                const myWrongs = vault.wrongBook.filter(w => w.childId === child.id && !w.mastered);

                let listHtml = '';
                if (myWrongs.length === 0) {
                    listHtml = `
                        <div class="p-8 text-center bg-emerald-50 text-emerald-800 rounded-2xl border border-emerald-200 text-sm font-medium">
                            <i class="fa-solid fa-shield-heart text-3xl mb-2"></i>
                            <p>Tahniah! Buku Salah Saya kosong. Anda telah menguasai semua bentuk pengiraan dengan cemerlang!</p>
                        </div>
                    `;
                } else {
                    myWrongs.forEach(wb => {
                        const q = MATHE_QUESTION_BANK.find(quest => quest.id === wb.questionId);
                        if(!q) return;

                        let optionsBtnHtml = '';
                        q.options.forEach(opt => {
                            optionsBtnHtml += `
                                <button onclick="app.retryWrongQuestion('${wb.id}', '${opt}')" class="px-3 py-2 bg-white border border-purple-soft rounded-lg hover:bg-purple-premium hover:text-white transition font-bold text-xs">
                                    ${opt}
                                </button>
                            `;
                        });

                        listHtml += `
                            <div class="bg-white p-4 rounded-2xl border border-red-100 shadow-xs space-y-3">
                                <div class="flex justify-between items-start">
                                    <span class="text-[10px] bg-red-50 text-red-600 px-2 py-0.5 rounded-md font-bold">${q.topic}</span>
                                    <span class="text-[10px] text-slate-400 font-medium">Percubaan Silap: ${wb.wrongCount} kali</span>
                                </div>
                                <p class="text-sm font-bold text-slate-800">${q.question}</p>
                                <div class="bg-lavender-soft/40 p-2 rounded-xl text-xs text-slate-500 leading-relaxed">
                                    <span class="font-bold text-[10px] text-purple-premium block">Petunjuk Semula:</span>
                                    Cuba jawab semula daripada pilihan di bawah untuk melupuskan rekod kelemahan (Perlu 3x berturut betul. Progress sekarang: ${wb.correctRetryCount}/3).
                                </div>
                                <div class="flex flex-wrap gap-2 pt-1">
                                    ${optionsBtnHtml}
                                </div>
                            </div>
                        `;
                    });
                }

                return `
                    <div class="max-w-3xl mx-auto px-4 py-8 w-full">
                        <div class="flex items-center gap-2 mb-2">
                            <button onclick="app.navigateTo('child-dashboard')" class="text-slate-400 hover:text-purple-premium"><i class="fa-solid fa-arrow-left text-lg"></i></button>
                            <h3 class="heading-font font-bold text-lg text-slate-900">Workspace Buku Salah Saya</h3>
                        </div>
                        <p class="text-xs text-slate-400 mb-6">Pusat pemulihan automatik. Soalan yang tersilap disimpan di sini supaya anak boleh membaiki kefahaman secara fokus.</p>
                        
                        <div class="space-y-4">
                            ${listHtml}
                        </div>
                    </div>
                `;
            }

            templateParentReport() {
                const vault = this.getVault();
                const child = vault.children.find(c => c.id === app.targetChildReportId);
                if(!child) return '<div class="p-6">Profil tidak dijumpai.</div>';

                const attempts = vault.attempts.filter(a => a.childId === child.id);
                const progress = vault.progress.filter(p => p.childId === child.id);

                const totalAnswered = attempts.length;
                const correctCount = attempts.filter(a => a.isCorrect).length;
                const accuracy = totalAnswered > 0 ? Math.round((correctCount / totalAnswered) * 100) : 0;

                let progressRows = '';
                if(progress.length === 0) {
                    progressRows = `<tr><td colspan="3" class="p-4 text-center text-slate-400 text-xs">Tiada rekod penguasaan topik lagi. Sila jalankan minimum 1 sesi kuiz.</td></tr>`;
                } else {
                    progress.forEach(p => {
                        progressRows += `
                            <tr class="border-b border-slate-100 text-xs">
                                <td class="p-3 font-medium text-slate-800">${p.topic} (${p.difficulty})</td>
                                <td class="p-3 text-center text-slate-500">${p.totalAttempted}</td>
                                <td class="p-3 text-right font-bold ${p.masteryPercentage >= 70 ? 'text-emerald-600' : 'text-amber-600'}">${p.masteryPercentage}%</td>
                            </tr>
                        `;
                    });
                }

                // Cadangan Automatik Pintar
                let cadanganText = "Anak anda baru memulakan langkah pengajian. Galakkan anak menjawab modul Latihan Harian 10 minit sehari bagi menjana asas pengiraan awal yang stabil.";
                if(totalAnswered > 0) {
                    if(accuracy >= 80) {
                        cadanganText = `${child.name} menunjukkan penguasaan yang amat cemerlang dengan ketepatan purata ${accuracy}%. Disyorkan mencabar topik sedia ada pada peringkat aras 'Mencabar' bagi merangsang kemahiran KBAT.`;
                    } else if(accuracy >= 50) {
                        cadanganText = `${child.name} menunjukkan potensi yang baik namun menghadapi kekeliruan mutakhir. Dicadangkan membuat latihan berfokus di 'Buku Salah Saya' sekurang-kurangnya 10 minit sehari bagi menstabilkan semula kefahaman konseptual.`;
                    } else {
                        cadanganText = `Kadar pemahaman semasa ialah ${accuracy}%. Anak memerlukan bimbingan lebih dekat. Mohon tonton langkah pengiraan bersama Cikgu Geni di akhir setiap soalan kuiz dan fokus pada aras 'Mudah' dahulu.`;
                    }
                }

                return `
                    <div class="max-w-4xl mx-auto px-4 py-8 w-full">
                        <div class="flex items-center gap-2 mb-6">
                            <button onclick="app.navigateTo('parent-dashboard')" class="text-slate-400 hover:text-purple-premium"><i class="fa-solid fa-arrow-left text-lg"></i></button>
                            <h3 class="heading-font font-bold text-xl text-slate-900">Laporan Analitis Prestasi: ${child.name}</h3>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
                            <div class="bg-white p-5 rounded-2xl border border-purple-soft shadow-xs">
                                <span class="text-xs text-slate-400 font-bold block">Soalan Dijawab</span>
                                <span class="text-2xl font-black heading-font text-purple-premium">${totalAnswered} Soalan</span>
                            </div>
                            <div class="bg-white p-5 rounded-2xl border border-purple-soft shadow-xs">
                                <span class="text-xs text-slate-400 font-bold block">Ketepatan Purata</span>
                                <span class="text-2xl font-black heading-font text-emerald-600">${accuracy}% Betul</span>
                            </div>
                            <div class="bg-white p-5 rounded-2xl border border-purple-soft shadow-xs">
                                <span class="text-xs text-slate-400 font-bold block">Tahap KSSR Semasa</span>
                                <span class="text-sm font-black heading-font text-amber-500 bg-amber-50 px-2 py-1 rounded-md mt-1 inline-block">${child.currentLevel}</span>
                            </div>
                        </div>

                        <div class="bg-white rounded-2xl border border-purple-soft shadow-sm overflow-hidden mb-8">
                            <div class="p-4 bg-lavender-soft border-b border-purple-soft">
                                <h4 class="heading-font font-bold text-xs text-purple-900">Peratusan Penguasaan Sub-Topik DSKP</h4>
                            </div>
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-slate-50 text-slate-400 font-bold text-[10px] uppercase border-b border-slate-100">
                                        <th class="p-3">Nama Matriks Topik</th>
                                        <th class="p-3 text-center">Jumlah Percubaan</th>
                                        <th class="p-3 text-right">Tahap Penguasaan</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${progressRows}
                                </tbody>
                            </table>
                        </div>

                        <div class="bg-white p-5 rounded-2xl border border-purple-soft shadow-xs flex gap-4 items-start bg-gradient-to-r from-white to-purple-50/30">
                            <div class="text-3xl">💡</div>
                            <div>
                                <h4 class="font-bold text-xs text-slate-900 mb-1">Nota Cadangan Pendidik Pintar:</h4>
                                <p class="text-xs text-slate-600 leading-relaxed">${cadanganText}</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            templateSettings() {
                const vault = this.getVault();
                return `
                    <div class="max-w-2xl mx-auto px-4 py-8 w-full">
                        <h3 class="heading-font font-bold text-xl text-slate-900 mb-1">Tetapan Sistem & Profil</h3>
                        <p class="text-xs text-slate-400 mb-6">Urus parameter akaun pentadbir keluarga anda di sini.</p>
                        
                        <div class="bg-white rounded-3xl border border-purple-soft shadow-sm p-6 space-y-6 text-xs">
                            <div>
                                <h4 class="font-bold text-sm text-purple-premium mb-3 border-b border-slate-100 pb-1">Maklumat Profil Penjaga</h4>
                                <div class="grid grid-cols-2 gap-4">
                                    <div><span class="text-slate-400 block">Nama Pengguna:</span> <p class="font-medium text-sm text-slate-800">${vault.currentParent.name}</p></div>
                                    <div><span class="text-slate-400 block">Nombor Telefon:</span> <p class="font-medium text-sm text-slate-800">${vault.currentParent.phone}</p></div>
                                    <div class="col-span-2"><span class="text-slate-400 block">E-mel Pentadbir:</span> <p class="font-medium text-sm text-slate-800">${vault.currentParent.email}</p></div>
                                </div>
                            </div>

                            <div class="bg-lavender-soft p-4 rounded-xl border border-purple-soft">
                                <h4 class="font-bold text-purple-950 mb-1">Status Pengaktifan Aplikasi</h4>
                                <p class="text-[11px] text-purple-800 mb-3">Sistem sekarang beroperasi dalam: <strong class="text-purple-premium font-black">${vault.currentParent.accessStatus}</strong></p>
                                ${vault.currentParent.accessStatus === 'Demo Mode' ? `
                                <div class="flex gap-2">
                                    <input type="text" id="setting-code-input" placeholder="Masukkan kod (GENIUS123)" class="bg-white px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-purple-premium grow">
                                    <button onclick="app.activateCode(document.getElementById('setting-code-input').value)" class="bg-purple-premium text-white px-4 py-2 rounded-lg font-bold hover:bg-purple-700 transition">Aktifkan</button>
                                </div>
                                ` : '<p class="text-[10px] text-emerald-600 font-bold"><i class="fa-solid fa-circle-check"></i> Akaun anda aktif sepenuhnya dengan Akses Seumur Hidup (Lifetime Active).</p>'}
                            </div>

                            <div class="pt-2 border-t border-slate-100 flex justify-between">
                                <button onclick="if(confirm('Adakah anda pasti mahu memadam semua data prestasi lokal?')) { localStorage.clear(); app.initStorage(); alert('Sistem telah di-reset.'); window.location.reload(); }" class="text-red-500 hover:text-red-700 font-bold"><i class="fa-solid fa-trash-can"></i> Padam Semua Data Lokal</button>
                                <button onclick="app.logout()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-bold transition">Log Keluar</button>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        // ==========================================
        // INITIALIZATION DEPLOYMENT INSTANCE
        // ==========================================
        const app = new MathsGeniusApp();
        
        // Bootstrapping Pertama Kali Jalankan Aplikasi
        window.addEventListener('DOMContentLoaded', () => {
            app.render();
        });
    </script>
</body>
</html>
