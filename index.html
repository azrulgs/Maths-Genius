<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths Genius by Genius Solihin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f8f7ff; }
        .gradient-bg { background: linear-gradient(135deg, #6d28d9, #eab308); }
        .card { background: white; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- DATA SOALAN (Contoh Struktur) ---
        const questionsDB = {
            1: [{ id: 1, topic: "Tambah", question: "2 + 3 = ?", options: ["4", "5", "6", "7"], answer: "5" }],
            2: [{ id: 2, topic: "Darab", question: "5 x 2 = ?", options: ["8", "10", "12", "15"], answer: "10" }],
            3: [{ id: 3, topic: "Bahagi", question: "20 ÷ 4 = ?", options: ["4", "5", "6", "7"], answer: "5" }]
        };

        function App() {
            const [view, setView] = React.useState('landing');
            const [user, setUser] = React.useState(null);
            const [child, setChild] = React.useState(null);

            // --- KOMPONEN: LANDING PAGE ---
            const LandingPage = () => (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
                    <img src="/logo-gs.png" onError={(e) => e.target.src='https://ui-avatars.com/api/?name=GS&background=6d28d9&color=fff'} className="w-32 mb-6" />
                    <h1 className="text-4xl font-bold text-purple-900 mb-4">Maths Genius by Genius Solihin</h1>
                    <p className="text-gray-600 mb-8 max-w-md">Belajar Matematik Jadi Mudah, Seronok & Genius!</p>
                    <div className="space-x-4">
                        <button onClick={() => setView('login')} className="bg-purple-600 text-white px-8 py-3 rounded-full font-bold hover:bg-purple-700">Log Masuk Ibu Bapa</button>
                    </div>
                </div>
            );

            // --- KOMPONEN: DASHBOARD ANAK ---
            const ChildDashboard = () => (
                <div className="p-6 max-w-2xl mx-auto">
                    <div className="gradient-bg p-6 rounded-3xl text-white mb-6">
                        <h2 className="text-2xl font-bold">Hai, {child?.name}!</h2>
                        <p>Tahun: {child?.year}</p>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        <button className="card p-6 border-2 border-purple-100 hover:border-purple-500 transition">
                            📚 Mula Latihan
                        </button>
                        <button className="card p-6 border-2 border-yellow-100 hover:border-yellow-500 transition">
                            📖 Buku Salah Saya
                        </button>
                    </div>
                    <button onClick={() => setView('landing')} className="mt-8 text-gray-400">Log Keluar</button>
                </div>
            );

            // --- ROUTER SEDERHANA ---
            return (
                <main>
                    {view === 'landing' && <LandingPage />}
                    {view === 'login' && (
                        <div className="p-10 text-center">
                            <h2 className="text-2xl font-bold mb-5">Login Ibu Bapa</h2>
                            <button onClick={() => {setUser({name: 'Ibu'}); setView('childDashboard'); setChild({name: 'Ahmad', year: 'Tahun 2'})}} className="bg-purple-600 text-white px-6 py-2 rounded-lg">Masuk (Demo)</button>
                        </div>
                    )}
                    {view === 'childDashboard' && <ChildDashboard />}
                </main>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
