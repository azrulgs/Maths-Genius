<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths Genius by Genius Solihin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; }
        .gradient-card { background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%); }
    </style>
</head>
<body>

    <div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow-2xl overflow-hidden">
        <!-- Header -->
        <header class="p-6 flex items-center border-b">
            <img src="logo-gs.png" onerror="this.src='https://via.placeholder.com/50'" class="w-12 h-12 mr-3" alt="Logo">
            <div>
                <h1 class="font-bold text-lg text-purple-900">Maths Genius</h1>
                <p class="text-xs text-purple-600">by Genius Solihin</p>
            </div>
        </header>

        <!-- Main Content -->
        <main id="content" class="p-6">
            <!-- Landing Page -->
            <div id="landing-page">
                <h2 class="text-2xl font-bold text-purple-900 mb-4">Belajar Matematik Jadi Mudah, Seronok & Genius!</h2>
                <button onclick="showPage('pricing-page')" class="w-full bg-yellow-400 text-purple-900 font-bold py-4 rounded-2xl mb-3 shadow-lg">Beli Akses Lifetime</button>
                <button onclick="showPage('dashboard-page')" class="w-full border-2 border-purple-600 text-purple-600 font-bold py-4 rounded-2xl">Cuba Demo</button>
            </div>

            <!-- Pricing Page -->
            <div id="pricing-page" class="hidden">
                <h2 class="text-xl font-bold mb-4">Pakej Maths Genius Tahap 1</h2>
                <div class="bg-purple-50 p-6 rounded-3xl border-2 border-yellow-400 text-center">
                    <p class="text-3xl font-bold text-purple-900">RM 99.00</p>
                    <p class="text-sm text-gray-600 mb-6">Bayar Sekali Sahaja, Akses Lifetime</p>
                    <button onclick="activateLifetime()" class="w-full bg-purple-600 text-white py-3 rounded-xl font-bold">Beli Akses Lifetime</button>
                    <div class="mt-4">
                        <input type="text" id="activation-code" placeholder="Masukkan Kod" class="w-full p-2 border rounded-lg mb-2 text-center">
                        <button onclick="checkCode()" class="text-sm text-purple-700 underline">Aktifkan Kod Pembelian</button>
                    </div>
                </div>
            </div>

            <!-- Dashboard -->
            <div id="dashboard-page" class="hidden">
                <div class="gradient-card text-white p-6 rounded-3xl mb-6">
                    <p id="status-text" class="text-sm opacity-80">Status: Demo Mode</p>
                    <h2 class="text-xl font-bold">Selamat Datang, Ibu Bapa!</h2>
                </div>
                <div class="grid gap-4">
                    <div class="p-4 border rounded-2xl bg-gray-50">
                        <h3 class="font-bold">Anak: Razak (Tahun 1)</h3>
                        <p class="text-sm">Bintang: 0 | Progress: 0%</p>
                        <button class="mt-2 w-full bg-purple-600 text-white py-2 rounded-lg text-sm">Mula Belajar</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // State Management
        function showPage(pageId) {
            document.querySelectorAll('#content > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
        }

        function activateLifetime() {
            localStorage.setItem('access_status', 'lifetime_active');
            updateUI();
            alert("Tahniah! Akses Lifetime anda telah aktif.");
            showPage('dashboard-page');
        }

        function checkCode() {
            const code = document.getElementById('activation-code').value;
            if (code === "GENIUS123") {
                activateLifetime();
            } else {
                alert("Kod tidak sah!");
            }
        }

        function updateUI() {
            const status = localStorage.getItem('access_status');
            const statusText = document.getElementById('status-text');
            if (status === 'lifetime_active') {
                statusText.innerText = "Status Akses: Lifetime Active";
                statusText.className = "text-sm text-yellow-300 font-bold";
            }
        }

        // Initialize
        window.onload = updateUI;
    </script>
</body>
</html>
