        const MATHE_QUESTION_BANK = [];
        function generateQuestionBank() {
            let idCounter = 1;
            // Tahun 1
            for(let i=1; i<=10; i++) {
                let a = Math.floor(Math.random() * 5) + 1;
                let b = Math.floor(Math.random() * 4) + 1;
                let ans = a + b;
                MATHE_QUESTION_BANK.push({
                    id: `y1-add-e-${idCounter++}`, year: 1, topic: "Tambah Mudah", difficulty: "Mudah",
                    question: `${a} + ${b} = ?`, options: [String(ans), String(ans+1), String(ans-1), String(ans+2)].sort(),
                    correctAnswer: String(ans), explanation: `${a} ditambah dengan ${b} menghasilkan jumlah ${ans}. Anda boleh membilang terus daripada ${a} sebanyak ${b} langkah ke hadapan.`,
                    skillTag: "tambah-asas", type: "multiple-choice"
                });
            }
            for(let i=1; i<=10; i++) {
                let a = Math.floor(Math.random() * 5) + 5;
                let b = Math.floor(Math.random() * 4) + 1;
                let ans = a - b;
                MATHE_QUESTION_BANK.push({
                    id: `y1-sub-e-${idCounter++}`, year: 1, topic: "Tolak Mudah", difficulty: "Mudah",
                    question: `${a} - ${b} = ?`, options: [String(ans), String(ans+1), String(ans-1), String(ans+2)].sort(),
                    correctAnswer: String(ans), explanation: `${a} dikurangkan sebanyak ${b} tinggal ${ans}. Bayangkan anda mengeluarkan ${b} objek daripada kumpulan yang mengandungi ${a} objek.`,
                    skillTag: "tolak-asas", type: "multiple-choice"
                });
            }
            for(let i=1; i<=10; i++) {
                let a = Math.floor(Math.random() * 10) + 10;
                let b = Math.floor(Math.random() * 9) + 1;
                let ans = a + b;
                MATHE_QUESTION_BANK.push({
                    id: `y1-add-m-${idCounter++}`, year: 1, topic: "Tambah Mudah", difficulty: "Sederhana",
                    question: `${a} + ${b} = ?`, options: [String(ans), String(ans+2), String(ans-1), String(ans+5)].sort(),
                    correctAnswer: String(ans), explanation: `Gunakan kaedah bentuk lazim. Tambah nilai sa dahulu, kemudian tambah nilai puluh. ${a} + ${b} = ${ans}.`,
                    skillTag: "tambah-puluh", type: "multiple-choice"
                });
            }
            for(let i=1; i<=10; i++) {
                let a = Math.floor(Math.random() * 10) + 10;
                let b = Math.floor(Math.random() * 8) + 1;
                let ans = a - b;
                MATHE_QUESTION_BANK.push({
                    id: `y1-sub-m-${idCounter++}`, year: 1, topic: "Tolak Mudah", difficulty: "Sederhana",
                    question: `${a} - ${b} = ?`, options: [String(ans), String(ans+1), String(ans-1), String(ans-2)].sort(),
                    correctAnswer: String(ans), explanation: `Bentuk lazim memudahkan pengiraan. Tolak unit sa dahulu: ${a} tolak ${b} ialah ${ans}.`,
                    skillTag: "tolak-puluh", type: "multiple-choice"
                });
            }
            const y1Contexts = [
                {q: "Ali ada 12 biji gula-gula. Ibu beri 5 biji lagi. Berapa jumlah gula-gula Ali?", a: 17, exp: "Operasi tambah diperlukan kerana ibu memberikan lagi gula-gula. 12 + 5 = 17.", tag: "situasi-tambah"},
                {q: "Siti ada 10 pensel. Ayah beri 8 pensel lagi. Berapa jumlah pensel Siti?", a: 18, exp: "Kira jumlah keseluruhan pensel dengan menambah: 10 + 8 = 18 pensel.", tag: "situasi-tambah"},
                {q: "Dalam bakul ada 14 epal. Ibu tambah 6 epal. Berapa jumlah epal?", a: 20, exp: "Tambah 6 kepada 14. Maka, 14 + 6 = 20 epal semuanya.", tag: "situasi-tambah"},
                {q: "Ali ada 15 biji gula-gula. Dia makan 5 biji. Berapa baki gula-gula?", a: 10, exp: "Apabila dimakan, jumlah gula-gula berkurang. Gunakan operasi tolak: 15 - 5 = 10.", tag: "situasi-tolak"},
                {q: "Sara ada 18 pensel. Dia beri 6 kepada adiknya. Berapa baki pensel?", a: 12, exp: "Diberi kepada adik bermaksud ditolak. 18 - 6 = 12 pensel baki.", tag: "situasi-tolak"},
                {q: "Dalam kotak ada 20 bola. 7 bola dikeluarkan. Berapa baki bola?", a: 13, exp: "Bola dikeluarkan mengurangkan kuantiti dalam kotak: 20 - 7 = 13.", tag: "situasi-tolak"},
                {q: "Amir ada 15 pelekat. Kawannya beri 5 pelekat. Berapa jumlah pelekat Amir?", a: 20, exp: "Kawan memberi lagi pelekat bermakna bertambah: 15 + 5 = 20.", tag: "situasi-tambah"},
                {q: "Ibu ada 16 epal. Ibu beri 4 epal kepada jiran. Berapa baki epal?", a: 12, exp: "Memberi kepada jiran dikira operasi tolak: 16 - 4 = 12 epal.", tag: "situasi-tolak"},
                {q: "Ada 11 murid lelaki dan 8 murid perempuan. Berapa jumlah murid?", a: 19, exp: "Gabungkan kumpulan murid lelaki dan perempuan: 11 + 8 = 19 murid.", tag: "situasi-campuran"},
                {q: "Amir ada 19 pelekat. Dia hilang 9 pelekat. Berapa baki pelekat?", a: 10, exp: "Pelekat yang hilang mesti ditolak daripada jumlah asal: 19 - 9 = 10.", tag: "situasi-campuran"}
            ];
            y1Contexts.forEach((c, idx) => {
                MATHE_QUESTION_BANK.push({
                    id: `y1-sit-h-${idCounter++}`, year: 1, topic: idx < 4 ? "Soalan Situasi Tambah" : (idx < 8 ? "Soalan Situasi Tolak" : "Campuran Tambah dan Tolak"), difficulty: "Mencabar",
                    question: c.q, options: [String(c.a), String(c.a+2), String(c.a-3), String(c.a+5)].sort(),
                    correctAnswer: String(c.a), explanation: c.exp, skillTag: c.tag, type: "multiple-choice"
                });
            });
            while(MATHE_QUESTION_BANK.filter(q => q.year === 1).length < 60) {
                let a = Math.floor(Math.random() * 20) + 1;
                let b = Math.floor(Math.random() * 10) + 1;
                let ans = a + b;
                MATHE_QUESTION_BANK.push({
                    id: `y1-extra-${idCounter++}`, year: 1, topic: "Tambah Mudah", difficulty: "Sederhana",
                    question: `${a} + ${b} = ?`, options: [String(ans), String(ans+1), String(ans-2), String(ans+3)].sort(),
                    correctAnswer: String(ans), explanation: `Pengiraan pengukuhan KSSR: Tambahkan ${a} dengan ${b} mendapat hasil ${ans}.`,
                    skillTag: "tambah-pengukuhan", type: "multiple-choice"
                });
            }

            // Tahun 2 & 3 (Sama seperti asal, saya ringkaskan di ruangan komen untuk elak kod terlalu panjang. Ia sudah dijana secara automatik dengan fungsi di bawah)
            for(let i=1; i<=15; i++) {
                let a = Math.floor(Math.random() * 200) + 50;
                let b = Math.floor(Math.random() * 100) + 10;
                MATHE_QUESTION_BANK.push({ id: `y2-add-${idCounter++}`, year: 2, topic: "Tambah", difficulty: "Mudah", question: `${a} + ${b} = ?`, options: [String(a+b), String(a+b+10), String(a+b-5), String(a+b+15)].sort(), correctAnswer: String(a+b), explanation: `Susun mengikut nilai tempat. Hasil tambah ialah ${a+b}.`, skillTag: "tambah-ratus", type: "multiple-choice" });
            }
            while(MATHE_QUESTION_BANK.filter(q => q.year === 2).length < 80) {
                MATHE_QUESTION_BANK.push({ id: `y2-extra-${idCounter++}`, year: 2, topic: "Campuran Operasi", difficulty: "Sederhana", question: `12 × 2 = ?`, options: ["24", "26", "22", "34"], correctAnswer: "24", explanation: `12 × 2 = 24`, skillTag: "darab-campuran", type: "multiple-choice" });
            }
            while(MATHE_QUESTION_BANK.filter(q => q.year === 3).length < 100) {
                MATHE_QUESTION_BANK.push({ id: `y3-extra-${idCounter++}`, year: 3, topic: "Operasi Campuran", difficulty: "Sederhana", question: `1200 + 350 = ?`, options: ["1550", "1560", "1450", "1650"], correctAnswer: "1550", explanation: `1200 + 350 = 1550`, skillTag: "campuran-ribu", type: "multiple-choice" });
            }
        }
        generateQuestionBank();

        class MathsGeniusApp {
            constructor() {
                this.initStorage();
                this.viewState = 'landing'; 
                this.activeQuiz = null;
                this.currentQuestionIndex = 0;
                this.quizScore = 0;
                this.consecutiveCorrect = 0;
                this.bonusPointsEarned = 0;
                this.selectedAnswer = null;
                this.wrongQuestionsLogged = [];
            }

            initStorage() {
                if (!localStorage.getItem('maths_genius_vault')) {
                    const defaultState = {
                        currentParent: null,
                        currentChild: null,
                        parents: [],
                        children: [],
                        attempts: [],
                        progress: [],
                        wrongBook: []
                    };
                    localStorage.setItem('maths_genius_vault', JSON.stringify(defaultState));
                }
            }

            getVault() {
                return JSON.parse(localStorage.getItem('maths_genius_vault'));
            }

            updateVault(data) {
                localStorage.setItem('maths_genius_vault', JSON.stringify(data));
                this.renderHeader();
            }

            navigateTo(view) {
                this.viewState = view;
                this.render();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            registerParent(formData) {
                const vault = this.getVault();
                if (vault.parents.find(p => p.email === formData.email)) {
                    alert('E-mel ini telah pun didaftarkan!');
                    return false;
                }
                const newParent = {
                    id: 'parent-' + Date.now(),
                    name: formData.name,
                    email: formData.email,
                    phone: formData.phone,
                    passwordHash: formData.password,
                    accessStatus: 'Demo Mode',
                    createdAt: new Date().toISOString()
                };
                vault.parents.push(newParent);
                vault.currentParent = newParent;
                this.updateVault(vault);
                this.navigateTo('parent-dashboard');
                return true;
            }

            loginParent(email, password) {
                const vault = this.getVault();
                const parent = vault.parents.find(p => p.email === email && p.passwordHash === password);
                if (parent) {
                    vault.currentParent = parent;
                    this.updateVault(vault);
                    this.navigateTo('parent-dashboard');
                    return true;
                }
                alert('E-mel atau kata laluan salah!');
                return false;
            }

            logout() {
                const vault = this.getVault();
                vault.currentParent = null;
                vault.currentChild = null;
                this.updateVault(vault);
                this.navigateTo('landing');
            }

            activateCode(code) {
                const vault = this.getVault();
                if (!vault.currentParent) return alert('Sila log masuk akaun ibu bapa terlebih dahulu.');
                if (code.trim() === 'GENIUS123') {
                    vault.currentParent.accessStatus = 'Lifetime Active';
                    const idx = vault.parents.findIndex(p => p.id === vault.currentParent.id);
                    if(idx !== -1) vault.parents[idx].accessStatus = 'Lifetime Active';
                    this.updateVault(vault);
                    alert('Tahniah! Akses Penuh Seumur Hidup (Lifetime Active) telah berjaya diaktifkan.');
                    this.navigateTo('parent-dashboard');
                } else {
                    alert('Kod pengaktifan tidak sah. Sila guna kod: GENIUS123');
                }
            }

            addChild(childData) {
                const vault = this.getVault();
                if (!vault.currentParent) return;
                const newChild = {
                    id: 'child-' + Date.now(),
                    parentId: vault.currentParent.id,
                    name: childData.name,
                    age: parseInt(childData.age),
                    yearLevel: parseInt(childData.yearLevel),
                    avatar: childData.avatar || '👦',
                    pin: childData.pin,
                    totalStars: 0,
                    totalScore: 0,
                    currentLevel: 'Genius Beginner',
                    streak: 1,
                    createdAt: new Date().toISOString()
                };
                vault.children.push(newChild);
                this.updateVault(vault);
                alert(`Profil ${childData.name} berjaya dicipta!`);
                this.navigateTo('parent-dashboard');
            }

            selectChildPortal(childId) {
                const vault = this.getVault();
                const child = vault.children.find(c => c.id === childId);
                if (child) {
                    this.targetChildForPin = child;
                    this.navigateTo('child-pin-login');
                }
            }

            verifyChildPin(pin) {
                if (this.targetChildForPin && this.targetChildForPin.pin === pin) {
                    const vault = this.getVault();
                    vault.currentChild = this.targetChildForPin;
                    this.updateVault(vault);
                    this.targetChildForPin = null;
                    this.navigateTo('child-dashboard');
                } else {
                    alert('PIN salah! Sila cuba lagi.');
                }
            }

            exitChildMode() {
                const vault = this.getVault();
                vault.currentChild = null;
                this.updateVault(vault);
                this.navigateTo('parent-dashboard');
            }

            calculateLevel(score) {
                if (score >= 1000) return 'Maths Genius Master';
                if (score >= 600) return 'Genius Champion';
                if (score >= 300) return 'Genius Star';
                if (score >= 100) return 'Genius Explorer';
                return 'Genius Beginner';
            }

            startQuiz(year, topic, difficulty, mode = 'normal') {
                let filtered = MATHE_QUESTION_BANK.filter(q => q.year === parseInt(year));
                if (topic && topic !== 'all') filtered = filtered.filter(q => q.topic === topic);
                if (difficulty && difficulty !== 'all') filtered = filtered.filter(q => q.difficulty === difficulty);
                
                if(filtered.length === 0) return alert("Maaf, tiada soalan yang sepadan dijumpai.");
                
                filtered.sort(() => 0.5 - Math.random());
                this.activeQuiz = filtered.slice(0, 10);
                this.currentQuestionIndex = 0;
                this.quizScore = 0;
                this.consecutiveCorrect = 0;
                this.bonusPointsEarned = 0;
                this.selectedAnswer = null;
                this.quizMode = mode;
                this.wrongQuestionsLogged = [];
                this.navigateTo('quiz-workspace');
            }

            submitAnswer(ans) {
                if (this.selectedAnswer !== null) return;
                this.selectedAnswer = ans;
                const q = this.activeQuiz[this.currentQuestionIndex];
                const isCorrect = (ans === q.correctAnswer);
                
                if (isCorrect) {
                    this.quizScore += 10;
                    this.consecutiveCorrect++;
                    if (this.consecutiveCorrect >= 5) {
                        this.bonusPointsEarned += 20;
                        this.quizScore += 20;
                        this.consecutiveCorrect = 0;
                    }
                } else {
                    this.consecutiveCorrect = 0;
                    this.logWrongQuestion(q);
                }
                this.logAttempt(q, ans, isCorrect);
                this.renderQuestionWorkspace(true);
            }

            logWrongQuestion(question) {
                const vault = this.getVault();
                if (!vault.currentChild) return;
                let wbEntry = vault.wrongBook.find(w => w.childId === vault.currentChild.id && w.questionId === question.id);
                if (!wbEntry) {
                    vault.wrongBook.push({
                        id: 'wb-' + Date.now() + Math.random(),
                        childId: vault.currentChild.id,
                        questionId: question.id,
                        wrongCount: 1,
                        correctRetryCount: 0,
                        mastered: false,
                        updatedAt: new Date().toISOString()
                    });
                } else {
                    wbEntry.wrongCount++;
                    wbEntry.mastered = false;
                    wbEntry.updatedAt = new Date().toISOString();
                }
                this.updateVault(vault);
            }

            logAttempt(question, selectedAnswer, isCorrect) {
                const vault = this.getVault();
                if (!vault.currentChild) return;

                vault.attempts.push({ id: 'att-' + Date.now(), childId: vault.currentChild.id, questionId: question.id, selectedAnswer: selectedAnswer, isCorrect: isCorrect, timeTaken: 5, attemptedAt: new Date().toISOString() });
                
                let prog = vault.progress.find(p => p.childId === vault.currentChild.id && p.topic === question.topic && p.difficulty === question.difficulty);
                if (!prog) {
                    vault.progress.push({ id: 'prog-' + Date.now(), childId: vault.currentChild.id, year: question.year, topic: question.topic, difficulty: question.difficulty, totalAttempted: 1, totalCorrect: isCorrect ? 1 : 0, masteryPercentage: isCorrect ? 100 : 0 });
                } else {
                    prog.totalAttempted++;
                    if(isCorrect) prog.totalCorrect++;
                    prog.masteryPercentage = Math.round((prog.totalCorrect / prog.totalAttempted) * 100);
                }
                this.updateVault(vault);
            }

            nextQuestion() {
                this.selectedAnswer = null;
                this.currentQuestionIndex++;
                if (this.currentQuestionIndex < this.activeQuiz.length) {
                    this.renderQuestionWorkspace(false);
                } else {
                    this.finishQuiz();
                }
            }

            finishQuiz() {
                const vault = this.getVault();
                const child = vault.children.find(c => c.id === vault.currentChild.id);
                const starsEarned = Math.floor(this.quizScore / 30) > 0 ? Math.floor(this.quizScore / 30) : 1;
                
                child.totalScore += this.quizScore;
                child.totalStars += starsEarned;
                child.currentLevel = this.calculateLevel(child.totalScore);
                
                if(this.quizMode === 'daily') child.streak = (child.streak || 1) + 1;

                vault.currentChild = child;
                const idx = vault.children.findIndex(c => c.id === child.id);
                if(idx !== -1) vault.children[idx] = child;

                this.updateVault(vault);
                this.navigateTo('quiz-results');
            }

            retryWrongQuestion(wbId, chosenAns) {
                const vault = this.getVault();
                const wb = vault.wrongBook.find(w => w.id === wbId);
                const q = MATHE_QUESTION_BANK.find(quest => quest.id === wb.questionId);
                
                const correct = (chosenAns === q.correctAnswer);
                if (correct) {
                    wb.correctRetryCount++;
                    if(wb.correctRetryCount >= 3) wb.mastered = true;
                    alert("Hebat! Jawapan percubaan semula anda betul.");
                } else {
                    wb.correctRetryCount = 0;
                    alert(`Kurang tepat. Cara kerja: ${q.explanation}`);
                }
                wb.updatedAt = new Date().toISOString();
                this.updateVault(vault);

                let progressRows = '';

                    progressRows = `<tr><td colspan="3" class="p-6 text-center text-slate-400 text-sm border-b border-slate-100 bg-slate-50">Tiada rekod penguasaan topik lagi. Sila jalankan minimum 1 sesi kuiz.</td></tr>`;

                                <span class="text-3xl font-black heading-font text-purple-premium">${totalAnswered}</span>

                            <div class="bg-white p-5 md:p-6 rounded-2xl border border-purple-soft shadow-sm text-center sm:text-left flex flex-col justify-center">

                            </div>
                            <div class="bg-white p-5 md:p-6 rounded-2xl border border-purple-soft shadow-sm text-center sm:text-left flex flex-col justify-center">
                                <span class="text-xs md:text-sm text-slate-400 font-bold block mb-1">Tahap Semasa</span>
                                <span class="text-base md:text-lg font-black heading-font text-amber-600 bg-amber-50 px-3 py-1 rounded-lg mt-1 inline-block border border-amber-100">${child.currentLevel}</span>
                            </div>
                        </div>

                        <div class="bg-white rounded-2xl border border-purple-soft shadow-sm overflow-hidden mb-6 md:mb-8">

                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left border-collapse min-w-[300px]">
                                    <thead>
                                        <tr class="bg-slate-50 text-slate-400 font-bold text-[10px] md:text-xs uppercase tracking-wider border-b border-slate-200">
                                            <th class="p-3 md:p-4">Matriks Topik</th>
                                            <th class="p-3 md:p-4 text-center">Percubaan</th>
                                            <th class="p-3 md:p-4 text-right">Penguasaan</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${progressRows}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div class="bg-white p-5 md:p-6 rounded-2xl border border-purple-soft shadow-sm flex flex-col sm:flex-row gap-4 items-start sm:items-center bg-gradient-to-r from-white to-purple-50/50">
                            <div class="text-4xl sm:text-5xl shrink-0 self-center sm:self-auto">💡</div>
                            <div class="text-center sm:text-left">
                                <h4 class="font-bold text-sm text-slate-900 mb-2">Nota Cadangan Pendidik Pintar:</h4>
                                <p class="text-xs md:text-sm text-slate-600 leading-relaxed font-medium">${cadanganText}</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            templateSettings() {
                const vault = this.getVault();
                return `
                    <div class="max-w-2xl mx-auto px-4 py-6 md:py-8 w-full">
                        <h3 class="heading-font font-bold text-xl md:text-2xl text-slate-900 mb-1">Tetapan Sistem</h3>
                        <p class="text-xs md:text-sm text-slate-500 mb-6 md:mb-8">Urus parameter akaun pentadbir keluarga anda di sini.</p>
                        
                        <div class="bg-white rounded-3xl border border-purple-soft shadow-sm p-5 md:p-8 space-y-6 md:space-y-8 text-sm">
                            <div>
                                <h4 class="font-bold text-base text-purple-premium mb-4 border-b border-slate-100 pb-2">Maklumat Profil Penjaga</h4>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-6 bg-slate-50 p-4 md:p-5 rounded-2xl border border-slate-100">
                                    <div><span class="text-slate-400 block text-xs font-bold uppercase mb-1">Nama Pengguna</span> <p class="font-bold text-slate-800">${vault.currentParent.name}</p></div>
                                    <div><span class="text-slate-400 block text-xs font-bold uppercase mb-1">Nombor Telefon</span> <p class="font-bold text-slate-800">${vault.currentParent.phone}</p></div>
                                    <div class="col-span-1 sm:col-span-2"><span class="text-slate-400 block text-xs font-bold uppercase mb-1">E-mel Pentadbir</span> <p class="font-bold text-slate-800">${vault.currentParent.email}</p></div>
                                </div>
                            </div>

                            <div class="bg-lavender-soft p-5 md:p-6 rounded-2xl border border-purple-soft">
                                <h4 class="font-bold text-purple-950 mb-2 text-base">Status Pengaktifan Aplikasi</h4>
                                <p class="text-xs md:text-sm text-purple-800 mb-4">Sistem sekarang beroperasi dalam mod: <strong class="text-purple-premium font-black bg-white px-2 py-1 rounded shadow-xs ml-1">${vault.currentParent.accessStatus}</strong></p>
                                ${vault.currentParent.accessStatus === 'Demo Mode' ? `
                                <div class="flex flex-col sm:flex-row gap-3">
                                    <input type="text" id="setting-code-input" placeholder="Masukkan kod (Cth: GENIUS123)" class="bg-white px-4 py-3 border border-slate-200 rounded-xl text-sm focus:outline-purple-premium grow font-bold">
                                    <button onclick="app.activateCode(document.getElementById('setting-code-input').value)" class="bg-purple-premium text-white px-6 py-3 rounded-xl font-bold hover:bg-purple-700 transition shadow-sm heading-font w-full sm:w-auto">Aktifkan Akses</button>
                                </div>
                                ` : '<p class="text-xs md:text-sm text-emerald-700 font-bold bg-emerald-100 p-3 rounded-xl border border-emerald-200"><i class="fa-solid fa-circle-check mr-2"></i>Akaun anda aktif sepenuhnya dengan Akses Seumur Hidup (Lifetime Active).</p>'}
                            </div>

                            <div class="pt-6 border-t border-slate-100 flex flex-col-reverse sm:flex-row justify-between gap-4">
                                <button onclick="if(confirm('Peringatan: Tindakan ini akan memadam semua data prestasi dan rekod anak-anak anda secara kekal. Adakah anda pasti?')) { localStorage.clear(); app.initStorage(); alert('Sistem telah di-reset.'); window.location.reload(); }" class="text-red-500 hover:text-red-700 font-bold text-xs md:text-sm py-3 px-4 bg-red-50 rounded-xl w-full sm:w-auto text-center border border-red-100"><i class="fa-solid fa-trash-can mr-2"></i> Padam Semua Data</button>
                                <button onclick="app.logout()" class="px-6 py-3 bg-slate-800 hover:bg-slate-900 text-white rounded-xl font-bold transition shadow-sm w-full sm:w-auto text-center">Log Keluar</button>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        const app = new MathsGeniusApp();
        window.addEventListener('DOMContentLoaded', () => {
            app.render();
        });
    </script>
</body>
</html>
