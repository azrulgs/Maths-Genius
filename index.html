        const db = firebase.database();

        class GenSoMathsApp {
            constructor() {
                this.dbRef = db.ref('users'); // Pangkalan data di awan
            }

            // Contoh fungsi simpan ke Firebase (Gantikan fungsi simpan lama anda)
            saveUserData(userId, data) {
                this.dbRef.child(userId).set(data);
            }

            // Contoh fungsi ambil data dari Firebase
            getUserData(userId, callback) {
                this.dbRef.child(userId).on('value', (snapshot) => {
                    callback(snapshot.val());
                });
            }
            
            // ... (Fungsi-fungsi lain aplikasi anda)
        }
        
        const app = new GenSoMathsApp();
