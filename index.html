    <script>
        // Inisialisasi Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBnzVeU918yE1N86CfSOVEH_7za_Ubvjc0",
            authDomain: "maths-genius-1b171.firebaseapp.com",
            databaseURL: "https://maths-genius-1b171-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "maths-genius-1b171",
            storageBucket: "maths-genius-1b171.firebasestorage.app",
            messagingSenderId: "721438989994",
            appId: "1:721438989994:web:e911e4fb1244bba9953ad3"
        };
        firebase.initializeApp(firebaseConfig);

        // ALGORITMA PENJANA SOALAN MATEMATIK SEBENAR (TAHAP 1)
        const MATHE_QUESTION_BANK = [];
        function generateQuestionBank() {
            let idCounter = 1;
            for(let y = 1; y <= 3; y++) {
                for(let i = 0; i < 20; i++) {
                    let a = Math.floor(Math.random() * (10 * Math.pow(10, y-1))) + 1;
                    let b = Math.floor(Math.random() * (10 * Math.pow(10, y-1))) + 1;
                    let ansAdd = a + b;
                    let optAdd = [String(ansAdd), String(ansAdd+1), String(ansAdd-1), String(ansAdd+2)].sort(() => Math.random() - 0.5);
                    MATHE_QUESTION_BANK.push({ id: `add-${y}-${idCounter++}`, year: y, topic: "Tambah", difficulty: "Sederhana", question: `${a} + ${b} = ?`, options: optAdd, correctAnswer: String(ansAdd), explanation: `Bila kita kumpul semuanya, ${a} tambah ${b} menjadi ${ansAdd}.`, skillTag: "Tambah", type: "multiple-choice" });

                    let maxNum = Math.max(a, b) + 5;
                    let minNum = Math.min(a, b);
                    let ansSub = maxNum - minNum;
                    let optSub = [String(ansSub), String(ansSub+1), String(Math.abs(ansSub-1)), String(ansSub+2)].sort(() => Math.random() - 0.5);
                    MATHE_QUESTION_BANK.push({ id: `sub-${y}-${idCounter++}`, year: y, topic: "Tolak", difficulty: "Sederhana", question: `${maxNum} - ${minNum} = ?`, options: optSub, correctAnswer: String(ansSub), explanation: `Bila ditolak, bilangannya makin sikit. ${maxNum} buang ${minNum} tinggal ${ansSub}.`, skillTag: "Tolak", type: "multiple-choice" });

                    let m1 = Math.floor(Math.random() * (y === 1 ? 5 : 9)) + 1;
                    let m2 = Math.floor(Math.random() * 5) + 1;
                    let ansMul = m1 * m2;
                    let optMul = [String(ansMul), String(ansMul+m2), String(Math.abs(ansMul-m2)), String(ansMul+1)].sort(() => Math.random() - 0.5);
                    MATHE_QUESTION_BANK.push({ id: `mul-${y}-${idCounter++}`, year: y, topic: "Darab Asas", difficulty: "Sederhana", question: `${m1} × ${m2} = ?`, options: optMul, correctAnswer: String(ansMul), explanation: `Darab bermaksud tambah berulang kali. ${m1} darab ${m2} ialah ${ansMul}.`, skillTag: "Darab", type: "multiple-choice" });

                    let divAns = Math.floor(Math.random() * 9) + 1;
                    let divisor = Math.floor(Math.random() * (y === 1 ? 3 : 5)) + 1;
                    let dividend = divAns * divisor;
                    let optDiv = [String(divAns), String(divAns+1), String(Math.abs(divAns-1)), String(divAns+2)].sort(() => Math.random() - 0.5);
                    MATHE_QUESTION_BANK.push({ id: `div-${y}-${idCounter++}`, year: y, topic: "Bahagi Asas", difficulty: "Sederhana", question: `${dividend} ÷ ${divisor} = ?`, options: optDiv, correctAnswer: String(divAns), explanation: `Bahagi bermaksud kongsi sama rata. ${dividend} dibahagi kepada ${divisor} orang, setiap seorang dapat ${divAns}.`, skillTag: "Bahagi", type: "multiple-choice" });

                    let w1 = Math.floor(Math.random() * (10 * y)) + 1;
                    let w2 = Math.floor(Math.random() * (5 * y)) + 1;
                    let ansMoney = `RM${w1 + w2}`;
                    let optMoney = [ansMoney, `RM${w1+w2+1}`, `RM${Math.abs(w1+w2-1)}`, `RM${w1+w2+2}`].sort(() => Math.random() - 0.5);
                    MATHE_QUESTION_BANK.push({ id: `money-${y}-${idCounter++}`, year: y, topic: "Wang", difficulty: "Mudah", question: `RM${w1} + RM${w2} = ?`, options: optMoney, correctAnswer: ansMoney, explanation: `Kira nilai duit. RM${w1} tambah RM${w2} ialah RM${w1+w2}.`, skillTag: "Wang", type: "multiple-choice" });

                    let h1 = Math.floor(Math.random() * 10) + 1;
                    let ansTime = `${h1 + 2} jam`;
                    let optTime = [ansTime, `${h1+3} jam`, `${h1+1} jam`, `${h1+4} jam`].sort(() => Math.random() - 0.5);
                    MATHE_QUESTION_BANK.push({ id: `time-${y}-${idCounter++}`, year: y, topic: "Masa", difficulty: "Mudah", question: `${h1} jam + 2 jam = ?`, options: optTime, correctAnswer: ansTime, explanation: `Tambahkan nilai nombornya sahaja. ${h1} tambah 2 ialah ${h1+2} jam.`, skillTag: "Masa", type: "multiple-choice" });

                    let n = Math.floor(Math.random() * (50 * y)) + 10;
                    let ansNum = String(n + 1);
                    let optNum = [ansNum, String(n+2), String(n-1), String(n+10)].sort(() => Math.random() - 0.5);
                    MATHE_QUESTION_BANK.push({ id: `num-${y}-${idCounter++}`, year: y, topic: "Nombor Asas", difficulty: "Mudah", question: `Apakah nombor selepas ${n}?`, options: optNum, correctAnswer: ansNum, explanation: `Nombor selepas ${n} ialah ditambah 1, iaitu ${n+1}.`, skillTag: "Nombor", type: "multiple-choice" });

                    let senaraiPecahan = [
                        { q: "Separuh daripada sebiji pizza ditulis dalam pecahan sebagai...", a: "1/2", exp: "Separuh bermaksud 1 bahagian daripada 2 bahagian yang sama besar." },
                        { q: "Suku daripada sebiji kek ditulis dalam pecahan sebagai...", a: "1/4", exp: "Suku bermaksud 1 bahagian daripada 4 bahagian yang sama besar." },
                        { q: "Tiga suku daripada sebiji tembikai ditulis sebagai...", a: "3/4", exp: "Tiga suku bermaksud 3 bahagian daripada 4 bahagian." },
                        { q: "Satu pertiga daripada sebatang coklat ditulis sebagai...", a: "1/3", exp: "Satu pertiga bermaksud 1 bahagian daripada 3 bahagian." },
                        { q: "Dua perlima daripada sekeping roti ditulis sebagai...", a: "2/5", exp: "Dua perlima bermaksud 2 bahagian daripada 5 bahagian." },
                        { q: "Kawasan berlorek ialah 1 bahagian daripada 4. Apakah pecahannya?", a: "1/4", exp: "1 bahagian daripada 4 bahagian keseluruhan ditulis sebagai 1/4." }
                    ];
                    let pilihanRawak = senaraiPecahan[Math.floor(Math.random() * senaraiPecahan.length)];
                    let fracOpt = [pilihanRawak.a];
                    let semuaPilihan = ["1/2", "1/4", "3/4", "1/3", "2/5", "1/5", "2/3"];
                    while(fracOpt.length < 4) {
                        let jawapanRawak = semuaPilihan[Math.floor(Math.random() * semuaPilihan.length)];
                        if(!fracOpt.includes(jawapanRawak)) fracOpt.push(jawapanRawak);
                    }
                    fracOpt = fracOpt.sort(() => Math.random() - 0.5);
                    MATHE_QUESTION_BANK.push({ id: `frac-${y}-${idCounter++}`, year: y, topic: "Pecahan Mudah", difficulty: "Mencabar", question: pilihanRawak.q, options: fracOpt, correctAnswer: pilihanRawak.a, explanation: pilihanRawak.exp, skillTag: "Pecahan", type: "multiple-choice" });
                }
            }
        }
        generateQuestionBank();

        class GenSoMathsApp {
            constructor() {
                this.db = firebase.database();
                this.viewState = 'landing'; 
                this.activeQuiz = null;
                this.currentQuestionIndex = 0;
                this.quizScore = 0;
                
                this.currentParent = JSON.parse(localStorage.getItem('gs_session_parent')) || null;
                this.currentChild = JSON.parse(localStorage.getItem('gs_session_child')) || null;

                this.parents = [];
                this.children = [];
                this.attempts = [];

                this.initDatabaseSync();
            }

            initDatabaseSync() {
                this.db.ref('/').on('value', (snapshot) => {
                    const data = snapshot.val() || {};
                    
                    // DIBAIKI: Memastikan struktur data dari Firebase dipetakan dengan selamat sebagai array
                    this.parents = data.parents ? Object.values(data.parents) : [];
                    this.children = data.children ? Object.values(data.children) : [];
                    this.attempts = data.attempts ? Object.values(data.attempts) : [];
                    
                    if (this.currentParent) {
                        this.currentParent = this.parents.find(p => p.id === this.currentParent.id) || null;
                        if(this.currentParent) localStorage.setItem('gs_session_parent', JSON.stringify(this.currentParent));
                    }
                    if (this.currentChild) {
                        this.currentChild = this.children.find(c => c.id === this.currentChild.id) || null;
                        if(this.currentChild) localStorage.setItem('gs_session_child', JSON.stringify(this.currentChild));
                    }
                    
                    this.render();
                });
            }

            setSession(type, data) {
                if(type === 'parent') {
                    this.currentParent = data;
                    localStorage.setItem('gs_session_parent', JSON.stringify(data));
                } else {
                    this.currentChild = data;
                    localStorage.setItem('gs_session_child', JSON.stringify(data));
                }
            }

            clearSession() {
                this.currentParent = null;
                this.currentChild = null;
                localStorage.removeItem('gs_session_parent');
                localStorage.removeItem('gs_session_child');
            }

            navigateTo(view) { 
                this.viewState = view; 
                this.render(); 
                window.scrollTo({ top: 0, behavior: 'smooth' }); 
            }

            registerParent(formData) {
                if (this.parents.find(p => p.email === formData.email || p.phone === formData.phone)) {
                    alert('E-mel atau Nombor Telefon ini telah pun didaftarkan!');
                    return false;
                }
                const now = new Date().getTime();
                const newParent = {
                    id: 'parent-' + Date.now(),
                    name: formData.name, email: formData.email, phone: formData.phone, passwordHash: formData.password,
                    accessStatus: 'Free Trial',
                    trialStartAt: now,
                    trialEndAt: now + (24 * 60 * 60 * 1000),
                    trialStatus: 'active'
                };
                
                this.db.ref('parents/' + newParent.id).set(newParent);
                this.setSession('parent', newParent);
                this.navigateTo('parent-dashboard');
            }

            loginParent(email, password) {
                const parent = this.parents.find(p => (p.email === email || p.phone === email) && p.passwordHash === password);
                if (parent) {
                    this.setSession('parent', parent);
                    this.navigateTo('parent-dashboard');
                } else {
                    alert('Log masuk gagal! E-mel/No. Telefon atau kata laluan salah.');
                }
            }

            logout() {
                this.clearSession();
                this.navigateTo('landing');
            }

            checkTrialStatus(parentObj) {
                if(parentObj.accessStatus === 'Lifetime Active') return true;
                const now = new Date().getTime();
                if(now > parentObj.trialEndAt) {
                    if(parentObj.trialStatus !== 'expired') {
                        this.db.ref('parents/' + parentObj.id).update({
                            trialStatus: 'expired',
                            accessStatus: 'Locked'
                        });
                    }
                    return false;
                }
                return true;
            }

            activateLifetimeAccess() {
                if(!this.currentParent) return;
                let code = prompt("Sila masukkan Kod Pengaktifan (Contoh Demo: GENIUS123)");
                if(code === "GENIUS123") {
                    this.db.ref('parents/' + this.currentParent.id).update({
                        accessStatus: 'Lifetime Active',
                        trialStatus: 'active'
                    });
                    alert("Tahniah! Akses Penuh GenSo Maths telah berjaya diaktifkan.");
                } else if(code) {
                    alert("Kod pengaktifan tidak sah. Sila hubungi Admin.");
                }
            }

            addChild(childData) {
                if (!this.currentParent) return;
                const newChild = {
                    id: 'child-' + Date.now(), parentId: this.currentParent.id,
                    childName: childData.name.trim(), age: parseInt(childData.age), schoolYear: parseInt(childData.schoolYear),
                    level: 'Tahap 1',
                    avatar: childData.avatar || '👦',
                    totalScore: 0, totalStars: 0, currentLevel: 'Genius Beginner', streak: 1,
                    lastAccessAt: new Date().getTime(),
                    weakTopics: [], strongTopics: []
                };
                
                this.db.ref('children/' + newChild.id).set(newChild);
                alert(`Profil ${childData.name} berjaya dicipta!`);
            }

            loginChildByName(searchName) {
                if(!searchName.trim()) return alert("Sila taip nama kamu.");
                const child = this.children.find(c => c.childName.toLowerCase() === searchName.trim().toLowerCase());
                
                if (child) {
                    const now = new Date().getTime();
                    this.db.ref('children/' + child.id).update({ lastAccessAt: now });
                    child.lastAccessAt = now;
                    this.setSession('child', child);
                    this.navigateTo('child-dashboard');
                } else {
                    alert('Nama ini belum didaftarkan. Minta ibu atau ayah tambah profil kamu dahulu.');
                }
            }

            exitChildMode() {
                this.currentChild = null;
                localStorage.removeItem('gs_session_child');
                this.navigateTo('landing');
            }

            startQuiz(topic, mode = 'normal') {
                const parent = this.parents.find(p => p.id === this.currentChild.parentId);
                if (!parent || !this.checkTrialStatus(parent)) {
                    alert("Wah, kamu sudah belajar dengan baik! Minta ibu atau ayah aktifkan akses penuh untuk sambung belajar.");
                    return;
                }

                let filtered = MATHE_QUESTION_BANK.filter(q => q.year === this.currentChild.schoolYear);
                if (topic !== 'all') filtered = filtered.filter(q => q.topic === topic);
                if(filtered.length === 0) return alert("Modul latihan sedang dikemaskini. Sila cuba topik lain.");
                
                filtered.sort(() => 0.5 - Math.random());
                this.activeQuiz = filtered.slice(0, 10);
                this.currentQuestionIndex = 0;
                this.quizScore = 0;
                this.quizMode = mode;
                this.selectedAnswer = null;
                this.navigateTo('quiz-workspace');
            }

            submitAnswer(ans) {
                if (this.selectedAnswer !== null) return;
                this.selectedAnswer = ans;
                const q = this.activeQuiz[this.currentQuestionIndex];
                const isCorrect = (ans === q.correctAnswer);
                if (isCorrect) this.quizScore += 10;
                
                const attempt = { 
                    id: 'attempt-' + Date.now() + '-' + Math.floor(Math.random() * 1000),
                    childId: this.currentChild.id, 
                    topic: q.topic, 
                    isCorrect: isCorrect, 
                    timeTaken: 30 
                };
                
                this.db.ref('attempts/' + attempt.id).set(attempt);
                this.renderQuestionWorkspace(true);
            }

            nextQuestion() {
                this.selectedAnswer = null;
                this.currentQuestionIndex++;
                if (this.currentQuestionIndex < this.activeQuiz.length) {
                    this.renderQuestionWorkspace(false);
                } else {
                    this.finishQuiz();
                }
            }

            finishQuiz() {
                const child = this.children.find(c => c.id === this.currentChild.id);
                const starsEarned = Math.floor(this.quizScore / 20) || 1;
                
                let updatedScore = child.totalScore + this.quizScore;
                let updatedStars = child.totalStars + starsEarned;
                let updatedStreak = child.streak + 1;
                let updatedLevel = child.currentLevel;
                
                if(updatedScore > 500) updatedLevel = "Maths Genius Master";
                else if(updatedScore > 300) updatedLevel = "Genius Champion";
                else if(updatedScore > 150) updatedLevel = "Genius Star";
                else if(updatedScore > 50) updatedLevel = "Genius Explorer";
                
                this.db.ref('children/' + child.id).update({
                    totalScore: updatedScore,
                    totalStars: updatedStars,
                    streak: updatedStreak,
                    currentLevel: updatedLevel
                });
                
                this.navigateTo('quiz-results');
            }

            renderHeader() {
                const container = document.getElementById('header-actions');
                if (!container) return;

                if (this.currentChild) {
                    container.innerHTML = `
                        <div class="flex items-center gap-2 bg-lavender-soft px-3 py-1.5 rounded-full border border-purple-soft">
                            <span class="text-xs font-bold text-purple-premium">🌟 ${this.currentChild.childName}</span>
                            <div class="bg-white px-2 py-0.5 rounded-full shadow-xs text-xs font-bold text-amber-500"><i class="fa-solid fa-star"></i> ${this.currentChild.totalStars}</div>
                            <button onclick="app.exitChildMode()" class="text-red-500 hover:text-red-700 ml-2" title="Keluar"><i class="fa-solid fa-right-from-bracket"></i></button>
                        </div>`;
                } else if (this.currentParent) {
                    const isTrial = this.currentParent.accessStatus !== 'Lifetime Active';
                    container.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="hidden sm:block text-right">
                                <p class="text-xs font-bold text-slate-800">${this.currentParent.name}</p>
                                <span class="text-[10px] px-2 py-0.5 rounded-full font-bold ${isTrial ? 'bg-amber-100 text-amber-800' : 'bg-emerald-100 text-emerald-800'}">${this.currentParent.accessStatus}</span>
                            </div>
                            <button onclick="app.navigateTo('parent-dashboard')" class="text-slate-600 hover:text-purple-premium text-sm font-bold"><i class="fa-solid fa-chart-pie mr-1"></i> Utama</button>
                            <button onclick="app.logout()" class="text-xs font-bold text-red-500 bg-red-50 px-3 py-1.5 rounded-lg ml-2">Keluar</button>
                        </div>`;
                } else {
                    container.innerHTML = `
                        <button onclick="app.navigateTo('login')" class="text-purple-premium font-bold text-sm px-2">Log Masuk Ibu Bapa</button>
                        <button onclick="app.navigateTo('register')" class="bg-purple-premium text-white font-bold text-sm px-4 py-2 rounded-xl shadow-xs">Cuba Percuma</button>
                    `;
                }
            }

            render() {
                this.renderHeader();
                const container = document.getElementById('app-viewport');

                if (this.viewState === 'parent-dashboard' && !this.currentParent) return this.navigateTo('login');
                if ((this.viewState === 'child-dashboard' || this.viewState === 'quiz-workspace') && !this.currentChild) return this.navigateTo('child-login');

                switch (this.viewState) {
                    case 'landing': container.innerHTML = this.templateLanding(); break;
                    case 'child-login': container.innerHTML = this.templateChildNameLogin(); break;
                    case 'login': container.innerHTML = this.templateLogin(); break;
                    case 'register': container.innerHTML = this.templateRegister(); break;
                    case 'parent-dashboard': container.innerHTML = this.templateParentDashboard(); break;
                    case 'child-dashboard': container.innerHTML = this.templateChildDashboard(); break;
                    case 'quiz-workspace': this.renderQuestionWorkspace(false); break;
                    case 'quiz-results': container.innerHTML = this.templateQuizResults(); break;
                    case 'parent-report': container.innerHTML = this.templateParentReport(); break;
                    default: container.innerHTML = `<div class="p-10 text-center text-slate-500">404 Tidak Dijumpai</div>`;
                }
            }

            templateLanding() {
                return `
                    <div class="bg-gradient-to-br from-purple-900 via-purple-700 to-indigo-900 text-white py-12 md:py-20 px-4 text-center">
                        <div class="max-w-4xl mx-auto">
                            <span class="bg-yellow-cheerful text-slate-900 text-[12px] md:text-xs font-bold px-4 py-1.5 rounded-full heading-font uppercase">Belajar Matematik Jadi Mudah, Seronok & Genius!</span>
                            <h2 class="heading-font text-3xl md:text-5xl font-black mt-6 mb-6 tracking-tight leading-tight">Bantu Anak Darjah 1, 2 & 3 Kuasai Matematik Dengan Mudah & Seronok</h2>
                            <div class="flex flex-col sm:flex-row justify-center gap-4 max-w-md mx-auto sm:max-w-none w-full">
                                <button onclick="app.navigateTo('child-login')" class="bg-yellow-cheerful text-slate-900 font-extrabold px-8 py-4 rounded-2xl shadow-xl hover:scale-105 transition text-base md:text-lg heading-font flex justify-center items-center gap-2">
                                    <i class="fa-solid fa-graduation-cap"></i> Saya Murid (Mula Belajar)
                                </button>
                                <button onclick="app.navigateTo('register')" class="bg-white text-purple-premium font-extrabold px-8 py-4 rounded-2xl shadow-xl hover:scale-105 transition text-base md:text-lg heading-font border-2 border-purple-200 flex justify-center items-center gap-2">
                                    <i class="fa-solid fa-users"></i> Ibu Bapa (Daftar Percuma)
